<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kroxy AI — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="auth-card" id="loginCard">
    <div class="brand">
      <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="url(#lg)"/>
        <path d="M14 24C14 18 19 14 24 14C29 14 34 18 34 24C34 30 29 34 24 34" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="24" cy="24" r="4" fill="white"/>
        <path d="M24 30L20 37M24 30L28 37" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#5B21B6"/></linearGradient></defs>
      </svg>
      <span>Kroxy</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to Kroxy AI</p>

    <div class="error-box hidden" id="loginError"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="eye-btn" onclick="toggleEye('loginPass',this)" type="button">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <div class="divider"><span>or</span></div>
    <p class="switch-text">Don&apos;t have an account? <a href="#" onclick="showCard('register')">Create one</a></p>
  </div>

  <div class="auth-card hidden" id="registerCard">
    <div class="brand">
      <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="url(#rg)"/>
        <path d="M14 24C14 18 19 14 24 14C29 14 34 18 34 24C34 30 29 34 24 34" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="24" cy="24" r="4" fill="white"/>
        <path d="M24 30L20 37M24 30L28 37" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#5B21B6"/></linearGradient></defs>
      </svg>
      <span>Kroxy</span>
    </div>
    <h1>Create account</h1>
    <p class="subtitle">Join Kroxy AI — it&apos;s free</p>

    <div class="error-box hidden" id="regError"></div>
    <div class="success-box hidden" id="regSuccess"></div>

    <div class="name-row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="regFirst" placeholder="John" autocomplete="given-name"/>
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="regLast" placeholder="Doe" autocomplete="family-name"/>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="regPass" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <button class="eye-btn" onclick="toggleEye('regPass',this)" type="button">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div id="strengthFill"></div></div>
      <span id="strengthLabel"></span>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="pass-wrap">
        <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password"/>
        <button class="eye-btn" onclick="toggleEye('regConfirm',this)" type="button">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="auth-btn" id="registerBtn" onclick="handleRegister()">Create Account</button>
    <div class="divider"><span>or</span></div>
    <p class="switch-text">Already have an account? <a href="#" onclick="showCard('login')">Sign in</a></p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
